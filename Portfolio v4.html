    @keyframes wave2 { from{height:10px} to{height:5px}  }
    @keyframes wave3 { from{height:6px}  to{height:20px} }

    @keyframes glitch1 {

      91% { clip-path:inset(52% 0 10% 0); transform:skewX(7deg) translateX(6px); opacity:0.55; }
      93% { clip-path:inset(28% 0 42% 0); transform:skewX(-4deg) translateX(-2px); opacity:0.88; }

          { fr:"8 apps déployées", en:"8 apps deployed", ko:"8개 앱 배포" },
          { fr:"3 intégrations API", en:"3 API integrations", ko:"3개 API 통합" }
        ]},
      { company:'Freelance', role:{ fr:'Développeur Web', en:'Web Developer', ko:'웹 개발자' },
        period:'2021 — 2023', current:false,
        desc:{ fr:"Création de sites web et d'applications sur mesure pour des clients variés (startups, PME, associations). Spécialisation en React, performance web et intégrations CMS.", en:"Custom website and application creation for various clients (startups, SMEs, associations). Specialization in React, web performance and CMS integrations.", ko:"다양한 고객(스타트업, 중소기업, 단체)을 위한 맞춤형 웹사이트 및 애플리케이션 제작. React, 웹 성능 및 CMS 통합 전문화." },
        outcomes:[
          { fr:"12 projets livrés", en:"12 projects delivered", ko:"12개 프로젝트 납품" },
          { fr:"Score Lighthouse 95+", en:"Lighthouse score 95+", ko:"라이트하우스 점수 95+" },
        ]},
    ];

    const currently = [
      { title:'Ambient Forge — Beta',
        desc:{ fr:"Générateur de musique ambiante IA, actuellement en phase de test avec 50 utilisateurs pilotes. Chaque mood génère une texture sonore unique.", en:"AI ambient music generator, currently in testing with 50 pilot users. Each mood generates a unique sonic texture.", ko:"50명의 파일럿 사용자와 테스트 중인 AI 앰비언트 음악 생성기. 각 무드가 독특한 음향 질감을 생성합니다." },
        stack:['Python','Web Audio API','React','FastAPI'],
        progress:68,
        since:'Mars 2024' }
    ];
  </script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="portfolio-fx.jsx"></script>
<script type="text/babel" src="portfolio-ui.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  const [lang,  setLang]  = useState(() => localStorage.getItem('portfolio_lang')  || 'fr');
  const [mode,  setMode]  = useState(() => localStorage.getItem('portfolio_mode')  || 'dark');
  const [tweaksVisible, setTweaksVis] = useState(false);
  const [easter, setEaster] = useState(false);
  const [tweaks, setTweaksState] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('portfolio_tweaks') || '{}') }; }
    catch { return { ...TWEAK_DEFAULTS }; }
  });

  const scrollRef        = useRef(0);
  const activeSectionRef = useRef('hero');
  const { accent } = tweaks;
  const t = i18n[lang] || i18n.fr;

  useEffect(() => { localStorage.setItem('portfolio_lang', lang); }, [lang]);

  // Mode toggle + transition
  useEffect(() => {
    localStorage.setItem('portfolio_mode', mode);
    document.body.classList.add('mode-transitioning');
    document.body.classList.toggle('mode-light', mode === 'light');
    const tid = setTimeout(() => document.body.classList.remove('mode-transitioning'), 520);
    return () => clearTimeout(tid);
  }, [mode]);

  // Font style
  useEffect(() => {
    const ff = tweaks.fontStyle === 'humanist' ? "'Georgia','Times New Roman',serif" : "'Space Grotesk',sans-serif";
    document.querySelectorAll('h1,h2,h3').forEach(el => el.style.fontFamily = ff);
  }, [tweaks.fontStyle]);

  // Scroll tracking for ambient parallax
  useEffect(() => {
    const fn = () => { scrollRef.current = window.scrollY; };
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  // Active section detection for atmosphere system
  useEffect(() => {
    const ids = ['hero','projects','music','about','education','experience','contact','current'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) activeSectionRef.current = e.target.id; });
    }, { threshold: 0.45 });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  // Tweaks host bridge (hidden from end visitors — panel removed)
  useEffect(() => {
    const fn = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVis(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVis(false);
    };
    window.addEventListener('message', fn);
    return () => window.removeEventListener('message', fn);
  }, []);

  const setTweaksValue = next => {
    setTweaksState(next);
    try { localStorage.setItem('portfolio_tweaks', JSON.stringify(next)); } catch(e) {}
  };

  const bodyFont = lang === 'ko' ? "'Noto Sans KR','Inter',sans-serif" : "'Inter',sans-serif";

  return (
    <div style={{ fontFamily:bodyFont, minHeight:'100vh', position:'relative' }}>
      <ScrollProgress accent={accent}/>
      <AmbientCanvas scrollRef={scrollRef} activeSectionRef={activeSectionRef} accent={accent} mode={mode}/>
      <CursorEffect accent={accent} activeSectionRef={activeSectionRef}/>

      <div style={{ position:'relative', zIndex:1 }}>
        <Nav lang={lang} setLang={setLang} t={t} accent={accent} mode={mode} toggleMode={() => setMode(m => m==='dark'?'light':'dark')}/>
        <Hero       t={t} lang={lang} accent={accent} mode={mode}/>
        <Projects   t={t} lang={lang} accent={accent}/>
        <Music      t={t} lang={lang} accent={accent}/>
        <About      t={t} lang={lang} accent={accent}/>
        <Education  t={t} lang={lang} accent={accent}/>
        <Experience t={t} lang={lang} accent={accent}/>
        <CurrentlyBuilding t={t} lang={lang} accent={accent}/>
        <Contact    t={t} lang={lang} accent={accent}/>
        <Footer     t={t} accent={accent} onEaster={() => setEaster(true)}/>
      </div>

      <EasterEgg visible={easter} onClose={() => setEaster(false)} accent={accent}/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaksValue} visible={tweaksVisible}/>
      <FloatingPauseButton accent={accent}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
