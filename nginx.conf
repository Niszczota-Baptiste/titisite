# Titisite — configuration Nginx pour VPS (à placer dans /etc/nginx/sites-available/titisite)
# Remplacer yourdomain.com par ton domaine réel.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # Certificat SSL (géré par certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max upload (doit couvrir BUILD_MAX_BYTES)
    client_max_body_size 1100M;

    # Timeouts généreux pour les gros uploads
    proxy_read_timeout    1800s;
    proxy_send_timeout    1800s;
    proxy_connect_timeout 10s;

    # Headers de sécurité complémentaires (ceux du code Helmet + extras Nginx)
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # Cache agressif sur les assets Vite (noms contenant un hash)
    location ~* /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Tout le reste → Node
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache : jamais sur les routes API ni sur index.html
        add_header Cache-Control "no-store" always;
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # Logs
    access_log /var/log/nginx/titisite.access.log;
    error_log  /var/log/nginx/titisite.error.log warn;
}
