version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Paris"
    # Group non-breaking updates together to reduce PR noise.
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    # Label Dependabot PRs for easy filtering in the PR list
    labels:
      - "dependencies"
