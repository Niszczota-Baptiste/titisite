# Nginx — baptiste-niszczota.com
# Copier dans : /etc/nginx/sites-available/titisite
# Puis : sudo ln -s /etc/nginx/sites-available/titisite /etc/nginx/sites-enabled/

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name baptiste-niszczota.com www.baptiste-niszczota.com;
    return 301 https://baptiste-niszczota.com$request_uri;
}

# ── HTTPS principal ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name baptiste-niszczota.com www.baptiste-niszczota.com;

    # Certificat Let's Encrypt (généré par certbot)
    ssl_certificate     /etc/letsencrypt/live/baptiste-niszczota.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baptiste-niszczota.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → non-www
    if ($host = www.baptiste-niszczota.com) {
        return 301 https://baptiste-niszczota.com$request_uri;
    }

    # Uploads jusqu'à 1,2 Go (builds de jeu)
    client_max_body_size 1200M;

    # Timeouts généreux pour les gros uploads
    proxy_read_timeout  1800s;
    proxy_send_timeout  1800s;
    proxy_connect_timeout 60s;

    # Compression Gzip (Nginx compresse mieux qu'Express)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml font/woff2;

    # ── Proxy vers Express ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
